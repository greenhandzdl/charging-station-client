<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="充电站管理系统 — Flutter Web">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="充电站管理系统">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>充电站管理系统</title>
  <link rel="manifest" href="manifest.json">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; width: 100%; background: #f5f5f5; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }

    #loading-container {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #f5f5f5;
      z-index: 9999;
      transition: opacity 0.5s ease;
    }
    #loading-container.hidden { opacity: 0; pointer-events: none; }

    .spinner {
      width: 40px; height: 40px;
      border: 4px solid #e0e0e0;
      border-top: 4px solid #1976d2;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #loading-text {
      margin-top: 20px;
      color: #616161;
      font-size: 14px;
    }

    #error-container {
      position: fixed; inset: 0;
      display: none; flex-direction: column;
      align-items: center; justify-content: center;
      background: #f5f5f5;
      padding: 32px;
      z-index: 9998;
    }
    #error-container.visible { display: flex; }

    #error-container .error-icon {
      width: 64px; height: 64px;
      border-radius: 50%;
      background: #ff5252;
      color: white;
      display: flex; align-items: center; justify-content: center;
      font-size: 32px; font-weight: bold;
      margin-bottom: 16px;
    }
    #error-container h2 {
      color: #212121;
      font-size: 18px; font-weight: 600;
      margin-bottom: 8px;
    }
    #error-container p {
      color: #757575;
      font-size: 14px;
      text-align: center;
      line-height: 1.5;
      margin-bottom: 24px;
    }
    #error-container button {
      padding: 10px 24px;
      background: #1976d2;
      color: white;
      border: none; border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
    }
    #error-container button:hover { background: #1565c0; }

    #error-detail {
      margin-top: 16px;
      color: #9e9e9e;
      font-size: 12px;
      max-width: 400px;
      text-align: center;
      word-break: break-all;
    }
  </style>
</head>
<body>
  <div id="loading-container">
    <div class="spinner"></div>
    <div id="loading-text">正在加载充电站管理系统...</div>
  </div>

  <script>
    // Show loading screen immediately
    document.getElementById('loading-container').style.display = 'flex';

    // When Flutter engine renders its first frame, hide our loading screen.
    // NOTE: In DDC (dev) mode, dwds may emit harmless errors that don't
    // prevent Flutter from loading — those are debug-infrastructure noise
    // and do NOT appear in release builds (flutter build web --release).
    window.addEventListener('flutter-first-frame', function() {
      var el = document.getElementById('loading-container');
      if (el) el.classList.add('hidden');
    });
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
