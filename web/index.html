<!DOCTYPE html>
<html>
<head>
  <base href="/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="充电站管理系统 — Flutter Web">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="充电站管理系统">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>充电站管理系统</title>
  <link rel="manifest" href="manifest.json">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; width: 100%; background: #f5f5f5; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }

    #loading-container {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #f5f5f5;
      z-index: 9999;
      transition: opacity 0.5s ease;
    }
    #loading-container.hidden { opacity: 0; pointer-events: none; }

    .spinner {
      width: 40px; height: 40px;
      border: 4px solid #e0e0e0;
      border-top: 4px solid #1976d2;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #loading-text {
      margin-top: 20px;
      color: #616161;
      font-size: 14px;
    }

    #error-container {
      position: fixed; inset: 0;
      display: none; flex-direction: column;
      align-items: center; justify-content: center;
      background: #f5f5f5;
      padding: 32px;
      z-index: 9998;
    }
    #error-container.visible { display: flex; }

    #error-container .error-icon {
      width: 64px; height: 64px;
      border-radius: 50%;
      background: #ff5252;
      color: white;
      display: flex; align-items: center; justify-content: center;
      font-size: 32px; font-weight: bold;
      margin-bottom: 16px;
    }
    #error-container h2 {
      color: #212121;
      font-size: 18px; font-weight: 600;
      margin-bottom: 8px;
    }
    #error-container p {
      color: #757575;
      font-size: 14px;
      text-align: center;
      line-height: 1.5;
      margin-bottom: 24px;
    }
    #error-container button {
      padding: 10px 24px;
      background: #1976d2;
      color: white;
      border: none; border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
    }
    #error-container button:hover { background: #1565c0; }

    #error-detail {
      margin-top: 16px;
      color: #9e9e9e;
      font-size: 12px;
      max-width: 400px;
      text-align: center;
      word-break: break-all;
    }
  </style>
</head>
<body>
  <div id="loading-container">
    <div class="spinner"></div>
    <div id="loading-text">正在加载充电站管理系统...</div>
  </div>

  <div id="error-container">
    <div class="error-icon">!</div>
    <h2>加载失败</h2>
    <p>页面加载失败，请尝试检查网络连接或刷新页面。</p>
    <button onclick="location.reload()">重新加载</button>
    <div id="error-detail"></div>
  </div>

  <script>
    // --- Loading screen control ---
    var loadingEl = document.getElementById('loading-container');

    // When Flutter engine renders its first frame, hide our loading screen.
    window.addEventListener('flutter-first-frame', function() {
      hideLoading();
    });

    function hideLoading() {
      if (loadingEl) loadingEl.classList.add('hidden');
    }

    // --- Error handling with fallback ---
    var errorEl = document.getElementById('error-container');
    var errorDetailEl = document.getElementById('error-detail');

    function showError(msg, detail) {
      hideLoading();
      if (errorEl) {
        errorEl.classList.add('visible');
        errorEl.style.display = 'flex';
      }
      if (errorDetailEl && detail) {
        errorDetailEl.textContent = detail;
      }
    }

    // Catch canvaskit / engine load failures
    window.addEventListener('error', function(e) {
      var src = e.target && (e.target.src || e.target.href);
      if (src && (src.indexOf('canvaskit') !== -1 || src.indexOf('flutter') !== -1 || src.indexOf('main.dart.js') !== -1)) {
        e.preventDefault();
        showError('Flutter 资源加载失败', src);
      }
    }, true);

    // Timeout: if Flutter doesn't load within 30 seconds, show error
    setTimeout(function() {
      if (loadingEl && !loadingEl.classList.contains('hidden')) {
        showError('加载超时', '页面加载时间超过 30 秒，请检查网络或刷新重试。');
      }
    }, 30000);
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
